services:
  - type: web
    name: formagbaku-crm
    runtime: python
    region: frankfurt
    plan: starter
    branch: main
    autoDeployTrigger: commit
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/status
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: ALLOW_DEV_AUTH_BYPASS
        value: "false"
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: N8N_WHATSAPP_SENDER_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USE_SSL
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
