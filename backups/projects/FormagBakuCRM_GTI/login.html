<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Login – Formag Forwarding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="logo.png" />

  <style>
    :root {
      --bg-deep: #050611;
      --bg-panel: rgba(15, 18, 36, 0.92);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --error: #fb7185;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, #1e1b4b 0, transparent 55%),
        radial-gradient(circle at bottom right, #4c1d95 0, transparent 55%),
        radial-gradient(circle at center, #020617 0, #020617 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Сетка */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
      background-size: 30px 30px;
      mix-blend-mode: soft-light;
      opacity: .6;
      z-index: 0;
    }

    /* Свечение */
    body::after {
      content: "";
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.15), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(40px);
      z-index: 0;
      animation: corePulse 10s ease-in-out infinite;
    }

    @keyframes corePulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.5;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 0.8;
      }
    }

    /* КАРТОЧКА */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 40px 32px;
      border-radius: 24px;
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(129, 140, 248, 0.3);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      text-align: center;
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      left: -50%;
      right: -50%;
      top: -150%;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(236, 72, 153, 0.1), rgba(168, 85, 247, 0.1), transparent);
      transform: rotate(-15deg);
      animation: panelScan 8s linear infinite;
      pointer-events: none;
    }

    @keyframes panelScan {
      0% {
        top: -150%;
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        top: 150%;
        opacity: 0;
      }
    }

    .logo-block {
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }

    .logo-block img {
      height: 50px;
      width: auto;
      filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.4));
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      letter-spacing: 0.02em;
    }

    .login-form {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 14px;
    }

    .field {
      text-align: left;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(2, 6, 23, 0.7);
      color: var(--text-main);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: rgba(96, 165, 250, 0.8);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
    }

    .field input::placeholder {
      color: rgba(156, 163, 175, 0.5);
    }

    .login-btn {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(96, 165, 250, 0.2);
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.24);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(14, 165, 233, 0.28);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: wait;
      transform: none;
    }

    /* СТИЛИ ДЛЯ НАДПИСИ С AI */
    .ai-slogan {
      margin-top: 28px;
      font-size: 13px;
      font-weight: 400;
      color: #9ca3af;
      position: relative;
      z-index: 2;
      letter-spacing: 0.3px;
    }

    .ai-highlight {
      font-weight: 800;
      font-size: 14px;
      margin-left: 2px;
      background: linear-gradient(135deg, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 6px rgba(192, 132, 252, 0.6));
    }

    .error-msg {
      margin-top: 10px;
      min-height: 20px;
      font-size: 13px;
      color: var(--error);
      position: relative;
      z-index: 2;
    }

    .footer-text {
      margin-top: 16px;
      font-size: 10px;
      color: rgba(148, 163, 184, 0.4);
    }

    .help-text {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(148, 163, 184, 0.65);
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <div class="logo-block">
      <img src="logo.png" alt="Formag Logo">
    </div>

    <h1 class="title">Welcome Back</h1>
    <p class="subtitle">Access your Formag Dashboard</p>

    <form id="login-form" class="login-form">
      <div class="field">
        <label for="email">Work Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="manager@formag.az" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Enter your password" required>
      </div>

      <button id="login-btn" type="submit" class="login-btn">Sign in</button>
    </form>

    <div class="ai-slogan">
      Experience the true power of <span class="ai-highlight">AI</span>
    </div>

    <div id="error-message" class="error-msg"></div>
    <div class="help-text">Use the email assigned in the staff list. Passwords will be managed in Supabase Auth.</div>

    <div class="footer-text">
      &copy; 2024 Formag Forwarding
    </div>
  </div>

  <script type="module">
    import { redirectIfAuthenticated, signInWithPassword } from "./auth.js";

    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const errorEl = document.getElementById('error-message');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    await redirectIfAuthenticated("index.html");

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      btn.disabled = true;
      btn.textContent = "Signing in...";
      errorEl.textContent = "";

      try {
        await signInWithPassword(emailInput.value.trim(), passwordInput.value);
        window.location.replace("index.html");
      } catch (error) {
        console.error(error);
        errorEl.textContent = error.message || "Authentication failed";
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });
  </script>
</body>

</html>
